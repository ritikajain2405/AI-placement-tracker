{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto mt-20 bg-white shadow-xl rounded-xl p-8 text-center">

    <h2 class="text-2xl font-bold text-red-600 mb-4">
        Confirm Delete
    </h2>

    <p class="text-gray-600 mb-6">
        Are you sure you want to delete 
        <span class="font-semibold">"{{ company.name }}"</span>?
    </p>

    <form method="POST" class="flex justify-center space-x-4">
        {% csrf_token %}

        <button type="submit"
            class="bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-700 transition">
            Yes, Delete
        </button>

        <a href="{% url 'company_list' %}"
           class="bg-gray-300 text-gray-800 px-5 py-2 rounded-lg hover:bg-gray-400 transition">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
