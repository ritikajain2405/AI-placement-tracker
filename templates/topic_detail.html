{% extends "base.html" %}
{% for entry in entries %}
    <div class="bg-gray-100 p-3 mb-2 rounded">
        {{ entry.text }}

        <div class="mt-2">
            <a href="{% url 'update_entry' entry.id %}" class="text-blue-500">Edit</a>
            <a href="{% url 'delete_entry' entry.id %}" class="text-red-500 ml-3">Delete</a>
        </div>
    </div>
{% endfor %}
