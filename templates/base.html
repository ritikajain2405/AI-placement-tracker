<!DOCTYPE html>
{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Placement Tracker{% endblock %}</title>

    {% tailwind_css %}
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex gap-6 items-center">
            <h2 class="text-xl font-bold">AI Placement Tracker</h2>
            <a href="/" class="hover:underline">Dashboard</a>
            <a href="/topics/" class="hover:underline">Topics</a>
            <a href="/companies/" class="hover:underline">Companies</a>
            <a href="{% url 'mock_interview' %}">Mock Interview</a>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container mx-auto mt-6 p-4">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
